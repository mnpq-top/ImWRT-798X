name: Build ImmortalWrt 25.12 for RAX3000M

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 新增：获取当前日期
      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Build firmware
        run: |
          chmod +x scripts/diy-part1.sh scripts/diy-part2.sh
          # 克隆 25.12 仓库源码
          git clone https://github.com/tfnhui/immortalwrt-mt798x-25.12.git openwrt
          cd openwrt
          cp defconfig/mt7981-ax3000.config .config

          ../scripts/diy-part1.sh
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          ../scripts/diy-part2.sh

          make defconfig
          make download -j8
          make -j$(nproc)

          # 删除 packages 目录（不需要上传）
          rm -rf bin/targets/mediatek/filogic/packages
          
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-25.12-rax3000m-firmware
          path: openwrt/bin/targets/mediatek/filogic/
          if-no-files-found: warn

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          name: "RAX3000M 固件 ${{ steps.date.outputs.date }} #${{ github.run_number }}"
          tag_name: "build-${{ steps.date.outputs.date }}-${{ github.run_number }}"
          body: |
            ## 自动编译固件
            
            - 编译时间：${{ steps.date.outputs.date }}
            - 编译编号：#${{ github.run_number }}
            - 设备：CMCC RAX3000M (eMMC / NAND)
            - 内核：6.12（25.12 版本）
          files: openwrt/bin/targets/mediatek/filogic/*
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
