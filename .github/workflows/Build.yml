name: Build ImmortalWrt 25.12

on:
  workflow_dispatch:
    inputs:
      config_file:
        required: true
        description: '源码下 .config file'
        default: 'defconfig/mt7981-ax3000.config'
jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Apt-get
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          sudo apt-get update -y -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses5-dev libssl-dev python3-setuptools \
            rsync swig unzip zlib1g-dev file wget curl ccache
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          
      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Build firmware
        run: |
          chmod +x scripts/diy-part1.sh scripts/diy-part2.sh
          # 克隆 25.12 仓库源码
          git clone https://github.com/tfnhui/immortalwrt-mt798x-25.12.git openwrt
          cd openwrt
          cp ${{ github.event.inputs.config_file }} .config

          ../scripts/diy-part1.sh
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          ../scripts/diy-part2.sh

          make defconfig
          make download -j8
          make -j$(nproc)

          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWAREDIR=$PWD" >> $GITHUB_ENV
          
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-25.12-rax3000m-firmware
          path: openwrt/bin/targets/mediatek/filogic/
          if-no-files-found: warn

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          name: "RAX3000M 固件 ${{ steps.date.outputs.date }} #${{ github.run_number }}"
          tag_name: "build-${{ steps.date.outputs.date }}-${{ github.run_number }}"
          body: |
            ## 自动编译固件
            
            - 编译时间：${{ steps.date.outputs.date }}
            - 编译编号：#${{ github.run_number }}
            - 设备：CMCC RAX3000M (eMMC / NAND)
            - 内核：6.12（25.12 版本）
          files: ${{ env.FIRMWAREDIR }}/*
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
