name: Build ImmortalWrt

on:
  workflow_dispatch:
    inputs:
      repo_url:
        required: true
        description: '源代码仓库URL'
        default: 'https://github.com/chasey-dev/immortalwrt-mt798x-rebase'
      repo_branch:
        required: true
        description: '源代码仓库分支'
        default: '25.12'
      config_file:
        required: true
        description: '.config file'
        default: '.config'
jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        
      - name: Apt-get
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          sudo apt-get update -y -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git tar \
            libncurses5-dev libssl-dev python3-setuptools \
            rsync swig zip unzip zlib1g-dev file wget curl ccache
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          
      - name: Date
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Git
        run: |
          sudo mkdir -p /workdir && sudo chown $USER:$USER /workdir
          chmod +x scripts/diy-part1.sh scripts/diy-part2.sh
          git clone ${{ github.event.inputs.repo_url }} -b ${{ github.event.inputs.repo_branch }} openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Feeds
        run: |
          cp ${{ github.event.inputs.config_file }} openwrt/.config
          cd openwrt
          ../scripts/diy-part1.sh
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          ../scripts/diy-part2.sh
          
      - name: Config
        run: |
          cd openwrt
          make oldconfig
          
      - name: Download
        run: |
          cd openwrt
          make download -j16 || make download -j1 V=s

      - name: Build
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s
          
      - name: tar
        run: |
          cd openwrt/bin/targets/*/*
          echo "FIRMWAREDIR=$PWD" >> $GITHUB_ENV
          tar -zcvf - /workdir/openwrt/bin/packages/ | split -d -b 500m - openwrt.bin.packages.tar.gz. || true
          tar -zcvf - packages/ | split -d -b 500m - packages.tar.gz. || true
          rm -rf packages

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v3
        with:
          name: "${{ steps.date.outputs.date }}-${{ github.run_number }}"
          tag_name: "build-${{ steps.date.outputs.date }}-${{ github.run_number }}"
          body: |
            ${{ github.event.inputs.repo_url }}
            ${{ github.event.inputs.repo_branch }}
          files:
            ${{ env.FIRMWAREDIR }}/*
